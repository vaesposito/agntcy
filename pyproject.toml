[project]
name = "tiny-teams-with-tokens"
version = "0.0.1"
description = "Status reports for AI-assisted engineering teams, generated from GitHub, Confluence, and Webex"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "sqlmodel>=0.0.22",
    "anthropic>=0.40",
    "pydantic-settings>=2.6",
    "python-dotenv>=1.0",
    "httpx>=0.27",
    "claude-agent-sdk>=0.2.87",
    "opentelemetry-api>=1.0",
    "pyyaml>=6.0.3",
    "docker>=7.1",
    "python-jose[cryptography]>=3.3",
    "aiosqlite>=0.20",
    "asyncpg>=0.29",
    "greenlet>=3.0",
    "alembic>=1.13",
    "kubernetes>=28.1.0",
]

[project.optional-dependencies]
connectors = [
    "PyGithub>=2.4",
    "atlassian-python-api>=3.41",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.7",
    "ty>=0.0.1a5",
]

[project.scripts]
ttt = "ttt.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["backend/ttt"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["backend/tests"]
pythonpath = ["backend"]

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["test_proxy.py"]

[tool.ruff.lint.per-file-ignores]
"backend/tests/**" = ["F841"]

[tool.ty.src]
include = ["backend/ttt"]

[tool.ty.rules]
# SQLModel column descriptors (`Column.desc()`, `Column.asc()`, etc.) confuse
# ty because the field is declared as `int`/`datetime`/`UUID` — the SQLAlchemy
# descriptor magic isn't modelled in stubs yet. Demote to warn so we still see
# the noise without gating CI on systemic third-party stub gaps.
unresolved-attribute = "warn"
invalid-argument-type = "warn"
