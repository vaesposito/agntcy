{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "llm-wiki.fullname" . }}-agent-manager
  namespace: {{ include "llm-wiki.agentNamespace" . }}
  labels:
    {{- include "llm-wiki.labels" . | nindent 4 }}
rules:
  # Pod lifecycle — KubernetesOrchestrator.ensure_running / stop / list_running
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete", "deletecollection"]
  # Pod log streaming — KubernetesOrchestrator.stream_logs
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]
  # Per-project PVCs — wiki_pvc_template + sessions_pvc_template in k8s_driver.py
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["create", "get", "list", "delete"]
  # Per-agent ClusterIP services — KubernetesOrchestrator._ensure_service / stop
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "list", "delete"]
  # Per-agent bearer token secrets — created by the orchestrator at pod start
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "delete"]
{{- end }}
