{{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "llm-wiki.fullname" . }}-data
  labels:
    {{- include "llm-wiki.labels" . | nindent 4 }}
  annotations:
    # Prevent helm uninstall from deleting the PVC and its data.
    # To truly decommission, run: kubectl delete pvc {{ include "llm-wiki.fullname" . }}-data
    "helm.sh/resource-policy": keep
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
{{- end }}
