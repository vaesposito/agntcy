{{/*
Pre-seeded credentials secret consumed by the Zalando postgres-operator on initdb.
The operator checks for a secret with this exact name before generating a random
password. Pre-creating it with a known value makes TTT_DATABASE_URL deterministic.

Secret name format: {user}.{cluster-name}.credentials.postgresql.acid.zalan.do
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "llm-wiki.postgresSecretName" . }}
  labels:
    {{- include "llm-wiki.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  username: {{ .Values.postgres.user | quote }}
  password: {{ .Values.secrets.POSTGRES_PASSWORD | quote }}
---
{{/*
App secret: all API keys, OAuth secrets, and the database URL.
Loaded into the backend container via envFrom secretRef.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "llm-wiki.appSecret" . }}
  labels:
    {{- include "llm-wiki.labels" . | nindent 4 }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.secrets.ANTHROPIC_API_KEY | quote }}
  ANTHROPIC_AUTH_TOKEN: {{ .Values.secrets.ANTHROPIC_AUTH_TOKEN | quote }}
  ANTHROPIC_BASE_URL: {{ .Values.secrets.ANTHROPIC_BASE_URL | quote }}
  GITHUB_TOKEN: {{ .Values.secrets.GITHUB_TOKEN | quote }}
  GITHUB_CLIENT_SECRET: {{ .Values.secrets.GITHUB_CLIENT_SECRET | quote }}
  CONFLUENCE_TOKEN: {{ .Values.secrets.CONFLUENCE_TOKEN | quote }}
  CONFLUENCE_CLIENT_SECRET: {{ .Values.secrets.CONFLUENCE_CLIENT_SECRET | quote }}
  CONFLUENCE_USER: {{ .Values.secrets.CONFLUENCE_USER | quote }}
  WEBEX_TOKEN: {{ .Values.secrets.WEBEX_TOKEN | quote }}
  WEBEX_CLIENT_SECRET: {{ .Values.secrets.WEBEX_CLIENT_SECRET | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.POSTGRES_PASSWORD | quote }}
  {{- if .Values.secrets.TTT_DATABASE_URL }}
  TTT_DATABASE_URL: {{ .Values.secrets.TTT_DATABASE_URL | quote }}
  {{- else }}
  TTT_DATABASE_URL: {{ printf "postgresql+asyncpg://%s:%s@%s:5432/%s?ssl=prefer" .Values.postgres.user .Values.secrets.POSTGRES_PASSWORD (include "llm-wiki.postgresHost" .) .Values.postgres.database | quote }}
  {{- end }}
