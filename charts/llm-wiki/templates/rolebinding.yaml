{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "llm-wiki.fullname" . }}-agent-manager
  namespace: {{ include "llm-wiki.agentNamespace" . }}
  labels:
    {{- include "llm-wiki.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "llm-wiki.fullname" . }}-agent-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "llm-wiki.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
